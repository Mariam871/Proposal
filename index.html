<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#FFF8F6,#FFE4EC,#FFF3EE);
    position:relative;
}

/* Floating Hearts */
.heart{
    position:fixed;
    bottom:-50px;
    pointer-events:none;
    animation:floatUp linear forwards;
    opacity:0.8;
    z-index:1;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:0.8;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Main Card */
.card{
    width:90%;
    max-width:420px;
    background:#ffffff;
    border-radius:35px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,182,193,0.25);
    position:relative;
    z-index:10;
}

.bow{
    font-size:50px;
    margin-bottom:15px;
}

.small-text{
    color:#9b8a8a;
    font-size:14px;
    margin-bottom:15px;
}

h1{
    font-family:'Pacifico',cursive;
    color:#ff7ea5;
    font-size:3rem;
    line-height:1.3;
    margin-bottom:35px;
}

.buttons{
    position:relative;
    height:80px;
    margin-top:20px;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 28px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

#yesBtn{
    background:linear-gradient(135deg,#ff8fb1,#ff5d8f);
    color:white;
    box-shadow:0 8px 20px rgba(255,93,143,.35);
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    position:fixed;
    left:calc(50% + 70px);
    top:calc(50% + 80px);
    border:none;
    border-radius:50px;
    padding:15px 28px;
    font-size:18px;
    background:#fff4f6;
    color:#666;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    cursor:pointer;
    z-index:1000;
    transition:all 0.15s ease;
}

/* YES Popup */
#popup{
    display:none;
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ffdce7,#fff0f4);
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}

.popup-card{
    background:white;
    width:90%;
    max-width:430px;
    border-radius:35px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,182,193,.25);
}

.ring{
    font-size:50px;
    margin-bottom:15px;
}

.popup-card h2{
    font-family:'Pacifico',cursive;
    color:#ff6d9b;
    font-size:2.5rem;
    margin-bottom:20px;
}

.popup-card p{
    color:#666;
    font-size:18px;
    line-height:1.7;
    margin:10px 0;
}

/* Mobile */
@media(max-width:480px){

    h1{
        font-size:2.3rem;
    }

    button{
        padding:13px 22px;
        font-size:16px;
    }

    .popup-card h2{
        font-size:2rem;
    }

    .popup-card p{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="bow">🎀</div>

    <p class="small-text">
        I've been waiting for the perfect moment...
    </p>

    <h1>
        Will you<br>marry me?
    </h1>

    <div class="buttons">
        <button id="yesBtn">Of Course! ❤️</button>
        <button id="noBtn">Nooo 🙈</button>
    </div>

</div>

<!-- YES SCREEN -->

<div id="popup">

    <div class="popup-card">

        <div class="ring">💍</div>

        <h2>
            Yayyy! ❤️
        </h2>

        <p>
            You said YES! 🥹💕
        </p>

        <p>
            You just made me the happiest person in the world.
        </p>

        <p>
            I can't wait to spend forever with you. 💞✨
        </p>

    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const popup = document.getElementById("popup");

/* No button moves inside buttons area */
function moveButton(){

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

/* Desktop */
noBtn.addEventListener("mouseenter", moveButton);

noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

/* YES clicked */
yesBtn.addEventListener("click", () => {

    popup.style.display = "flex";

    for(let i = 0; i < 120; i++){
        createHeart();
    }
});

/* Create Hearts */
function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "💗";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

/* Background floating hearts */
setInterval(createHeart, 700);

</script>

</body>
</html>
