<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartfull Decision</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 50px;
            margin-bottom: 40px;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 15px;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: white;
            color: #ff4d6d;
            position: absolute;
        }

        .message {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            color: #ff4d6d;
            font-size: 28px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>💍 Will You Marry Me Muhammad Inaam Ullah? 💍</h1>

        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😢</button>

        <div class="message" id="loveMessage">
            ❤️ I Love You Habibi ❤️
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const message = document.getElementById("loveMessage");

        // Initial position of No button
        noBtn.style.left = "55%";
        noBtn.style.top = "55%";

        // Move No button when cursor comes near it
        noBtn.addEventListener("mouseover", () => {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        });

        // Show message when Yes is clicked
        yesBtn.addEventListener("click", () => {
            message.style.display = "block";
        });
    </script>

</body>
</html>
